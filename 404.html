<!DOCTYPE html>

<head>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Plus Jakarta Sans', 'sans-serif'],
                        arabic: ['Amiri', 'serif'],
                    }
                }
            }
        }

    <style>
        body {
            background-color: #f8fafc; /* Slate 50 */
            color: #334155; /* Slate 700 */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        /* Islamic Pattern Overlay */
        .pattern-bg {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.6s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeIn { 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* Floating Icon Animation */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .floating-icon {
            animation: float 3s ease-in-out infinite;
        }
    </style>
</head>
<body class="selection:bg-teal-200 selection:text-teal-900">

    <!-- Hero Section -->
    <header class="bg-teal-900 relative pt-16 pb-36 overflow-hidden pattern-bg flex-shrink-0">
        <div class="absolute inset-0 bg-gradient-to-b from-transparent to-teal-900/90"></div>
        
        <div class="container mx-auto px-4 relative z-10 max-w-4xl text-center">
            <span class="inline-flex items-center gap-2 bg-red-500/20 border border-red-500/50 text-red-100 px-4 py-1.5 rounded-full text-xs font-semibold tracking-wider uppercase mb-6 shadow-sm">
                <i class="fa-solid fa-triangle-exclamation text-red-400"></i> Error 404
            </span>
            <h1 class="text-7xl md:text-8xl font-bold mb-4 text-white font-heading drop-shadow-md">
                404
            </h1>
            <h2 class="text-2xl md:text-3xl font-bold text-amber-400 font-heading">
                Halaman Tidak Ditemukan
            </h2>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 -mt-24 relative z-20 flex justify-center pb-16">
        
        <div class="bg-white p-8 md:p-12 rounded-3xl shadow-xl border border-slate-200 max-w-2xl w-full text-center fade-in">
            
            <!-- 404 Illustration -->
            <div class="mb-8 relative">
                <div class="absolute inset-0 bg-red-100 rounded-full blur-xl opacity-50 w-32 h-32 mx-auto"></div>
                <div class="floating-icon relative inline-flex items-center justify-center w-28 h-28 rounded-full bg-red-50 text-red-500 border-4 border-white shadow-lg text-5xl z-10 overflow-hidden p-3">
                    <!-- Anda bisa mengupload gambar ilustrasi 404 ke github dan mengubah nama file di bawah ini -->
                    <img src="logo-404.png" alt="Halaman Tidak Ditemukan" class="w-full h-full object-contain hover:scale-110 transition-transform duration-300" onerror="this.outerHTML='<i class=\'fa-solid fa-file-circle-question text-red-500\'></i>'">
                </div>
            </div>
            
            <p class="text-lg text-slate-600 mb-10 max-w-md mx-auto leading-relaxed">
                Maaf, halaman yang Anda cari mungkin telah dihapus, dipindahkan, atau alamatnya salah ketik. Silakan kembali ke ruang kelas.
            </p>

            <!-- Back Button -->
            <a href="https://ahmdd-zulfikar.github.io/" class="inline-flex items-center justify-center space-x-2 bg-teal-600 hover:bg-teal-700 text-white px-8 py-4 rounded-xl font-semibold transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5 group">
                <i class="fa-solid fa-house group-hover:scale-110 transition-transform"></i>
                <span>Kembali ke Beranda</span>
            </a>
            
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-400 py-10 border-t border-slate-800 mt-auto">
        <div class="container mx-auto px-4 text-center">
            <p class="text-xs mt-6 opacity-60 font-medium tracking-wide">&copy; 2026 Ahmad Zulfikar, S.Pd. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
