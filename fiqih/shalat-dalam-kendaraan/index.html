        async function submitQuizLogic(isForcedCheat = false) {
            window.isExamActive = false; document.getElementById('exam-watermark').classList.add('hidden'); 
            let correctCount = 0; const details = []; 
            questionData.forEach((item, i) => { const sel = document.querySelector(`input[name="q${i}"]:checked`); const isCorrect = sel ? parseInt(sel.value) === item.a : false; details.push(isCorrect); if (isCorrect) correctCount++; });

            const score = Math.round((correctCount / questionData.length) * 100);
            if(!isForcedCheat) showModal({ title: "Memproses...", message: "Menyimpan datamu...", type: 'loading', buttons: [] });

            try {
                if (!auth.currentUser) await signInAnonymously(auth);
